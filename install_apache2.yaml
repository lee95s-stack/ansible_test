---

- hosts: all
  become: true
  tasks:

  - name: update repository index
    dnf:
      update_cache: yes
    when: ansible_distribution == "RedHat"

  - name: install apache2 package
    dnf:
      name: httpd
      state: latest
    when: ansible_distribution == "RedHat"

  - name: add php support for apache
    dnf:
      name: php
      state: latest
    when: ansible_distribution == "RedHat"

  - name: update repository index
    command: zypper refresh
    when: ansible_distribution == "SLES_SAP"

  - name: install apache2 package
    zypper:
      name: apache2
      state: latest
    when: ansible_distribution == "SLES_SAP"

  - name: add php support for apache
    zypper:
      name: php8
      state: latest
    when: ansible_distribution == "SLES_SAP"
